services:
  - type: web
    name: ipl-fantasy-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server
    plan: starter
    envVars:
      - key: FANTASY_DB_PATH
        value: /opt/render/project/src/data/fantasy.db
    disk:
      name: fantasy-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
